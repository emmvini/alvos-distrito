<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alvos de Batismo - Nuvem Distrito</title>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    /* Estilos preservados do seu original para manter o layout */
    :root { --bg-body: #f0f4ff; --bg-card: #ffffff; --text-main: #222222; --text-muted: #555555; --border-color: #dde3f0; --input-bg: #f8f9ff; --header-bg: linear-gradient(135deg, #1a3a6b, #2e6bc4); --card-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); color: var(--text-main); padding-bottom: 40px; }
    header { background: var(--header-bg); color: white; padding: 20px 16px 16px; text-align: center; }
    .container { padding: 16px; max-width: 480px; margin: 0 auto; }
    .card { background: var(--bg-card); border-radius: 14px; padding: 16px; margin-bottom: 16px; box-shadow: var(--card-shadow); }
    .field-group { margin-bottom: 12px; }
    input, select { width: 100%; padding: 10px; margin-bottom: 8px; border: 1.5px solid var(--border-color); border-radius: 8px; }
    .btn { display: block; width: 100%; padding: 13px; background: #2e6bc4; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    .admin-only { display: none; }
    body.is-admin .admin-only { display: block; }
    .tab-bar { display: flex; background: var(--bg-card); padding: 4px; border-radius: 12px; margin-bottom: 16px; }
    .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; border-radius: 9px; color: var(--text-muted); }
    .tab.active { background: #2e6bc4; color: white; }
    .section { display: none; }
    .section.active { display: block; }
    .alvo-card { background: var(--bg-card); border-radius: 14px; padding: 14px; margin-bottom: 12px; border-left: 5px solid #2e6bc4; }
  </style>
</head>
<body>

<header>
  <h1>Alvos de Batismo 2026</h1>
</header>

<div class="container">
  <div id="app-content" style="display:none;">
    <div class="tab-bar">
      <div id="tab-btn-lista" class="tab active" onclick="showTab('lista')">📋 Lista</div>
      <div id="tab-btn-novo" class="tab admin-only" onclick="showTab('novo')">➕ Novo</div>
      <div id="tab-btn-config" class="tab" onclick="showTab('config')">⚙️ Config</div>
    </div>

    <div id="tab-lista" class="section active">
      <label>Filtrar por Igreja:</label>
      <select id="filtro-igreja" onchange="renderLista()">
        <option value="">Todas as Igrejas</option>
      </select>
      <input type="text" id="busca" placeholder="🔍 Buscar por nome..." onkeyup="renderLista()" />
      <div id="lista-alvos"></div>
    </div>
    
    <div id="tab-novo" class="section">...</div>
    <div id="tab-config" class="section">...</div>
  </div>
</div>

<script>
  var firebaseConfig = {
    apiKey: "AIzaSyDLwOpSGWl6gcmvmbpK07spWwi59I-hMrE",
    authDomain: "alvos-distrito.firebaseapp.com",
    projectId: "alvos-distrito",
    storageBucket: "alvos-distrito.firebasestorage.app",
    messagingSenderId: "157447650863",
    appId: "1:157447650863:web:988092cd55438539d950da"
  };

  var EMAILS_ADMINISTRADORES = ["emmanoel.vinicius@gmail.com", "camarjaziel@gmail.com", "l.lucas.va@gmail.com"];

  firebase.initializeApp(firebaseConfig);
  var auth = firebase.auth();
  var db = firebase.firestore();
  var alvos = [], igrejas = [];

  // Proteção de Administrador Robusta
  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById('app-content').style.display = 'block';
      var emailLogado = user.email.toLowerCase().trim();
      var isAdmin = EMAILS_ADMINISTRADORES.some(e => e.toLowerCase().trim() === emailLogado);
      if (isAdmin) document.body.classList.add('is-admin');
      conectarSincronizacao();
    }
  });

  function conectarSincronizacao() {
    db.collection("alvos").onSnapshot(s => { alvos = []; s.forEach(d => { let v = d.data(); v.id = d.id; alvos.push(v); }); renderLista(); });
    db.collection("igrejas").onSnapshot(s => { igrejas = []; s.forEach(d => { let v = d.data(); v.id = d.id; igrejas.push(v); }); atualizarFiltros(); renderLista(); });
  }

  function atualizarFiltros() {
    let sel = document.getElementById('filtro-igreja');
    sel.innerHTML = '<option value="">Todas as Igrejas</option>' + igrejas.map(i => `<option value="${i.nome}">${i.nome}</option>`).join('');
  }

  function renderLista() {
    let busca = document.getElementById('busca').value.toLowerCase();
    let filtro = document.getElementById('filtro-igreja').value;
    let lista = document.getElementById('lista-alvos');
    
    let filtrados = alvos.filter(a => 
      (filtro === '' || a.igreja === filtro) &&
      (a.nome.toLowerCase().includes(busca))
    );
    
    lista.innerHTML = filtrados.map(a => `
      <div class="alvo-card">
        <div style="font-weight:bold">${a.nome}</div>
        <div>⛪ ${a.igreja}</div>
        <button class="btn" onclick="alert('Detalhes de ${a.nome}')" style="margin-top:10px;">Ver detalhes</button>
      </div>`).join('');
  }

  function showTab(t) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.getElementById('tab-'+t).classList.add('active'); }
</script>
</body>
</html>
